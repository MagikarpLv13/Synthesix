<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <title>Synthesix evidence badge demo</title>
    <link rel="stylesheet" href="../../theme.css">
    <script type="module" src="../../assets/synthesix-ui.js"></script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, sans-serif;
      }
      .demo {
        display: grid;
        gap: 10px;
        width: min(560px, calc(100vw - 32px));
      }
    </style>
  </head>
  <body>
    <div class="demo">
      <sx-evidence-badge status="pending">Checking…</sx-evidence-badge>
      <sx-evidence-badge status="verified">Verified · hash matches</sx-evidence-badge>
      <sx-evidence-badge status="error">Verification failed · file missing</sx-evidence-badge>
    </div>
  </body>
</html>
