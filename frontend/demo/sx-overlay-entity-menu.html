<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <title>Synthesix overlay entity menu demo</title>
    <script src="../../assets/synthesix-overlay.js"></script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: #ffffff;
        font-family: system-ui, Arial, sans-serif;
        color: #334155;
      }
      .page { padding: 40px; max-width: 640px; }
      .page h1 { color: #0f172a; }
      mark { background: #bfdbfe; }
    </style>
  </head>
  <body>
    <div class="page">
      <h1>Page tierce (simulée)</h1>
      <p>Sélection détectée : <mark id="sel">jane.doe@example.com</mark> — le
         panneau « Ajouter à l'enquête » s'ouvre dessus.</p>
    </div>
    <sx-overlay-entity-menu></sx-overlay-entity-menu>
    <script type="module">
      customElements.whenDefined("sx-overlay-entity-menu").then(() => {
        const el = document.querySelector("sx-overlay-entity-menu");
        el.baseTagsets = ["Personne", "Email", "Compte en ligne"];
        el.existingTags = ["Prioritaire"];
        el.tagsetProperties = { Personne: ["Alias", "Adresse"], Email: ["Adresse", "Fournisseur"] };
        el.graphEntities = [
          { id: "e1", label: "Jane Doe", tags: ["Personne"], propertyKeys: ["Alias"] },
          { id: "e2", label: "ACME Corp", tags: ["Entreprise"], propertyKeys: [] },
        ];
        // Simulate a text selection so the trigger appears, then open the menu.
        const mark = document.getElementById("sel");
        const range = document.createRange();
        range.selectNodeContents(mark);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        document.dispatchEvent(new MouseEvent("mouseup"));
        setTimeout(() => {
          const trigger = el.shadowRoot.querySelector(".trigger");
          if (trigger) trigger.click();
        }, 30);
      });
    </script>
  </body>
</html>
