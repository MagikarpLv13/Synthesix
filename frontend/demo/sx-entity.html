<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <title>Synthesix entity / property demo</title>
    <link rel="stylesheet" href="../../theme.css">
    <script type="module" src="../../assets/synthesix-ui.js"></script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, sans-serif;
        padding: 24px;
        box-sizing: border-box;
      }
      .demo { display: grid; gap: 12px; width: min(560px, calc(100vw - 32px)); }
      .link {
        font: 12px Arial, sans-serif;
        color: var(--accent);
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <div class="demo">
      <sx-entity kind="email" confidence="92%" status="confirmed">
        alice@example.com
        <button slot="actions" class="link" type="button">Détacher</button>
        <sx-tag slot="meta" tone="info">fuite</sx-tag>
        <sx-tag slot="meta" tone="success">vérifié</sx-tag>
        <sx-property slot="properties">
          <span slot="label">source</span>
          breach-2021.txt
        </sx-property>
        <sx-property slot="properties">
          <span slot="label">première vue</span>
          2026-03-04
        </sx-property>
      </sx-entity>

      <sx-entity kind="username" confidence="0.74" status="candidate">
        MagikarpLv13
        <button slot="actions" class="link" type="button">Confirmer</button>
      </sx-entity>

      <sx-entity kind="domaine" status="rejected">
        suspicious.example.org
        <button slot="actions" class="link" type="button">Restaurer</button>
      </sx-entity>
    </div>
  </body>
</html>
