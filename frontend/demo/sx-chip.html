<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>sx-chip demo</title>
  <link rel="stylesheet" href="../../theme.css">
  <script type="module" src="../../assets/synthesix-ui.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; background: var(--bg); }
    .row { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
  </style>
</head>
<body>
  <h2>sx-chip — tones</h2>
  <div class="row">
    <sx-chip>neutral</sx-chip>
    <sx-chip tone="info">info</sx-chip>
    <sx-chip tone="success">success</sx-chip>
    <sx-chip tone="engine">Google</sx-chip>
    <sx-chip tone="muted">muted</sx-chip>
  </div>
</body>
</html>
