<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <title>Synthesix provenance demo</title>
    <link rel="stylesheet" href="../../theme.css">
    <script type="module" src="../../assets/synthesix-ui.js"></script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, sans-serif;
      }
      .demo {
        display: grid;
        gap: 12px;
        width: min(560px, calc(100vw - 32px));
      }
    </style>
  </head>
  <body>
    <div class="demo">
      <sx-provenance>
        <svg slot="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          aria-hidden="true">
          <circle cx="6" cy="19" r="2"></circle>
          <circle cx="18" cy="5" r="2"></circle>
          <path d="M6 17V9a4 4 0 0 1 4-4h6"></path>
        </svg>
        <span slot="label">Found via</span>
        exact query
      </sx-provenance>
      <sx-provenance>
        <svg slot="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          aria-hidden="true">
          <path d="M3 7l9 6 9-6"></path>
          <rect x="3" y="5" width="18" height="14" rx="2"></rect>
        </svg>
        <span slot="label">Investigation</span>
        Affaire #123 · MagikarpLv13
      </sx-provenance>
    </div>
  </body>
</html>
