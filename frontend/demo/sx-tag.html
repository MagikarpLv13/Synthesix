<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <title>Synthesix tag demo</title>
    <link rel="stylesheet" href="../../theme.css">
    <script type="module" src="../../assets/synthesix-ui.js"></script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, sans-serif;
      }
      .demo {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        width: min(720px, calc(100vw - 32px));
      }
    </style>
  </head>
  <body>
    <div class="demo">
      <sx-tag>breach</sx-tag>
      <sx-tag tone="neutral">pseudonyme</sx-tag>
      <sx-tag tone="info">priorité</sx-tag>
      <sx-tag tone="success">vérifié</sx-tag>
      <sx-tag tone="engine">github</sx-tag>
      <sx-tag tone="info" removable remove-label="Retirer le tag">à suivre</sx-tag>
    </div>
  </body>
</html>
