<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Synthesix is a multi-engine search tool that allows you to perform precise and advanced queries across several search engines (Google, Bing, Brave, DuckDuckGo).">
    <meta name="keywords" content="search, multi-engine, google, bing, brave, duckduckgo, synthesix">
    <title>Synthesix</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="theme.css">
    <script src="theme.js"></script>
</head>
<body>
    <main class="app">
        <header class="topbar">
            <div class="brand">
                <img class="brand-logo" src="assets/synthesix-mark.svg" alt="">
                <div class="brand-copy">
                    <h1 class="brand-name">Synthesix</h1>
                    <span class="brand-subtitle">Multi-engine search</span>
                </div>
            </div>
            <div class="top-actions">
                <button
                    id="vpn-status"
                    class="vpn-status vpn-status--checking"
                    type="button"
                    title="Checking the public IP used by Chrome. Click to refresh."
                    aria-label="Checking VPN status"
                >
                    <span class="vpn-status__dot" aria-hidden="true"></span>
                    <span id="vpn-status-label">Checking VPN</span>
                </button>
                <a href="history/history.html" target="_blank" rel="noopener noreferrer" class="nav-link">History</a>
                <button type="button" class="theme-toggle" data-theme-toggle aria-pressed="false">Dark mode</button>
            </div>
        </header>

        <section class="workspace" aria-label="Search workspace">
            <h2 class="search-title">Search, compare, synthesize.</h2>
            <div class="search-form">
                <div class="search-row">
                    <label for="search-field" class="sr-only">Search query</label>
                    <input
                        type="text"
                        id="search-field"
                        class="search-input"
                        required
                        autocomplete="off"
                        aria-autocomplete="list"
                        aria-expanded="false"
                        aria-controls="history-panel"
                        placeholder="What are you investigating?"
                    >
                    <button id="search-button" class="search-button" type="button">Search</button>
                </div>
                <div id="history-panel" class="history-panel" role="listbox" aria-label="Previous searches"></div>
            </div>

            <details class="osint-panel">
                <summary>OSINT filters</summary>
                <div class="operator-grid" aria-label="OSINT search filters">
                    <label class="operator-field" for="filter-site">
                        <span>Site</span>
                        <input type="text" id="filter-site" placeholder="example.com">
                    </label>
                    <label class="operator-field" for="filter-exclude">
                        <span>Exclude</span>
                        <input type="text" id="filter-exclude" placeholder="cheese">
                    </label>
                    <label class="operator-field" for="filter-title">
                        <span>Title</span>
                        <input type="text" id="filter-title" placeholder="profile">
                    </label>
                    <label class="operator-field" for="filter-url">
                        <span>URL</span>
                        <input type="text" id="filter-url" placeholder="admin">
                    </label>
                    <label class="operator-field" for="filter-body">
                        <span>Page text</span>
                        <input type="text" id="filter-body" placeholder="email">
                    </label>
                    <label class="operator-field" for="filter-filetype">
                        <span>File</span>
                        <input type="text" id="filter-filetype" placeholder="pdf">
                    </label>
                    <label class="operator-field" for="filter-country">
                        <span>Country</span>
                        <input
                            type="text"
                            id="filter-country"
                            list="country-options"
                            placeholder="Sweden or SE"
                            autocomplete="off"
                        >
                    </label>
                    <label class="operator-field" for="filter-after">
                        <span>After</span>
                        <input type="date" id="filter-after">
                    </label>
                    <label class="operator-field" for="filter-before">
                        <span>Before</span>
                        <input type="date" id="filter-before">
                    </label>
                </div>
                <datalist id="country-options">
                    <option value="Argentina">AR</option>
                    <option value="Australia">AU</option>
                    <option value="Austria">AT</option>
                    <option value="Belgium">BE</option>
                    <option value="Brazil">BR</option>
                    <option value="Bulgaria">BG</option>
                    <option value="Canada">CA</option>
                    <option value="Chile">CL</option>
                    <option value="China">CN</option>
                    <option value="Colombia">CO</option>
                    <option value="Croatia">HR</option>
                    <option value="Czechia">CZ</option>
                    <option value="Denmark">DK</option>
                    <option value="Estonia">EE</option>
                    <option value="Finland">FI</option>
                    <option value="France">FR</option>
                    <option value="Germany">DE</option>
                    <option value="Greece">GR</option>
                    <option value="Hong Kong">HK</option>
                    <option value="Hungary">HU</option>
                    <option value="Iceland">IS</option>
                    <option value="India">IN</option>
                    <option value="Indonesia">ID</option>
                    <option value="Ireland">IE</option>
                    <option value="Israel">IL</option>
                    <option value="Italy">IT</option>
                    <option value="Japan">JP</option>
                    <option value="South Korea">KR</option>
                    <option value="Latvia">LV</option>
                    <option value="Lithuania">LT</option>
                    <option value="Malaysia">MY</option>
                    <option value="Mexico">MX</option>
                    <option value="Netherlands">NL</option>
                    <option value="New Zealand">NZ</option>
                    <option value="Norway">NO</option>
                    <option value="Pakistan">PK</option>
                    <option value="Peru">PE</option>
                    <option value="Philippines">PH</option>
                    <option value="Poland">PL</option>
                    <option value="Portugal">PT</option>
                    <option value="Romania">RO</option>
                    <option value="Russia">RU</option>
                    <option value="Saudi Arabia">SA</option>
                    <option value="Singapore">SG</option>
                    <option value="Slovakia">SK</option>
                    <option value="Slovenia">SI</option>
                    <option value="South Africa">ZA</option>
                    <option value="Spain">ES</option>
                    <option value="Sweden">SE</option>
                    <option value="Switzerland">CH</option>
                    <option value="Taiwan">TW</option>
                    <option value="Thailand">TH</option>
                    <option value="Turkey">TR</option>
                    <option value="Ukraine">UA</option>
                    <option value="United Kingdom">GB</option>
                    <option value="United States">US</option>
                    <option value="Vietnam">VN</option>
                </datalist>
            </details>

            <div class="controls">
                <div class="engine-group" aria-label="Search engines">
                    <label class="engine-option"><input type="checkbox" id="engine-google" checked> Google</label>
                    <label class="engine-option"><input type="checkbox" id="engine-bing" checked> Bing</label>
                    <label class="engine-option"><input type="checkbox" id="engine-brave" checked> Brave</label>
                    <label class="engine-option"><input type="checkbox" id="engine-duckduckgo" checked> DuckDuckGo</label>
                </div>
                <label for="num-results" class="result-control">
                    Results
                    <input type="number" id="num-results" min="1" max="100" value="20">
                </label>
            </div>
            <div class="data-actions" aria-label="Data management">
                <span class="data-actions__label">Data</span>
                <button id="clear-synthesix-history" class="secondary-button" type="button">
                    Clear Synthesix history
                </button>
                <button id="clear-browser-data" class="danger-button" type="button">
                    Clear browser data
                </button>
            </div>
            <p id="action-status" class="action-status" role="status" aria-live="polite"></p>
            <p class="session-note">Closing all Synthesix tabs stops the program.</p>
        </section>
    </main>

    <script>
        (() => {
            window.name = "synthesix-home";

            const searchButton = document.getElementById("search-button");
            const searchField = document.getElementById("search-field");
            const historyPanel = document.getElementById("history-panel");
            const actionStatus = document.getElementById("action-status");
            const clearSynthesixHistoryButton = document.getElementById("clear-synthesix-history");
            const clearBrowserDataButton = document.getElementById("clear-browser-data");
            const vpnStatusButton = document.getElementById("vpn-status");
            const vpnStatusLabel = document.getElementById("vpn-status-label");
            const vpnCheckUrl = "https://api.ipapi.is";
            const engineIds = ["google", "bing", "brave", "duckduckgo"];
            const filterInputIds = {
                site: "filter-site",
                exclude: "filter-exclude",
                title: "filter-title",
                url: "filter-url",
                body: "filter-body",
                filetype: "filter-filetype",
                country: "filter-country",
                after: "filter-after",
                before: "filter-before"
            };
            const state = {
                history: [],
                visibleItems: [],
                activeIndex: -1,
                pendingAction: null,
                vpnCheckId: 0
            };

            const normalize = (value) => String(value || "").toLowerCase().trim();

            const setCaretToEnd = () => {
                const end = searchField.value.length;
                searchField.setSelectionRange(end, end);
            };

            const closeHistory = () => {
                state.activeIndex = -1;
                historyPanel.classList.remove("is-open");
                searchField.setAttribute("aria-expanded", "false");
            };

            const openHistory = () => {
                renderHistory(searchField.value);
                if (state.visibleItems.length || state.history.length) {
                    historyPanel.classList.add("is-open");
                    searchField.setAttribute("aria-expanded", "true");
                }
            };

            const selectHistoryItem = (item) => {
                searchField.value = item.query || "";
                setFilters(item.filters || {});
                closeHistory();
                searchField.focus();
                setCaretToEnd();
            };

            const setActiveItem = (index) => {
                state.activeIndex = index;
                Array.from(historyPanel.querySelectorAll(".history-item")).forEach((item, itemIndex) => {
                    item.classList.toggle("is-active", itemIndex === index);
                });
            };

            const renderHistory = (filterValue = "") => {
                const filter = normalize(filterValue);
                state.visibleItems = state.history
                    .filter((item) => {
                        const haystack = [
                            item.query,
                            item.display_query,
                            item.smart_query,
                            JSON.stringify(item.filters || {})
                        ].map(normalize).join(" ");
                        return !filter || haystack.includes(filter);
                    })
                    .slice(0, 8);
                state.activeIndex = -1;
                historyPanel.innerHTML = "";

                if (!state.visibleItems.length) {
                    if (!state.history.length) {
                        historyPanel.innerHTML = '<div class="empty-history">No previous searches yet.</div>';
                    } else {
                        historyPanel.innerHTML = '<div class="empty-history">No matching searches.</div>';
                    }
                    return;
                }

                state.visibleItems.forEach((item, index) => {
                    const button = document.createElement("button");
                    button.type = "button";
                    button.className = "history-item";
                    button.setAttribute("role", "option");
                    button.dataset.index = String(index);

                    const content = document.createElement("span");
                    const query = document.createElement("span");
                    query.className = "history-query";
                    query.textContent = item.display_query || item.query;

                    const meta = document.createElement("span");
                    meta.className = "history-meta";
                    meta.textContent = item.smart_query && item.smart_query !== item.query
                        ? item.smart_query
                        : item.date || "Previous search";

                    const count = document.createElement("span");
                    count.className = "history-count";
                    count.textContent = item.nb_results === "" ? "" : `${item.nb_results} results`;

                    content.append(query, meta);
                    button.append(content, count);
                    button.addEventListener("mousedown", (event) => {
                        event.preventDefault();
                        selectHistoryItem(item);
                    });
                    historyPanel.appendChild(button);
                });
            };

            const getSearchPayload = () => {
                const value = searchField.value.trim();
                const filters = getFilters();
                const hasFilters = Object.values(filters).some(Boolean);
                if (!value && !hasFilters) {
                    alert("Please enter a search term or filter.");
                    searchField.focus();
                    return null;
                }
                if (filters.after && filters.before && filters.after > filters.before) {
                    alert("The After date must be earlier than or equal to the Before date.");
                    document.getElementById("filter-after").focus();
                    return null;
                }

                const engines = {};
                engineIds.forEach((engine) => {
                    engines[engine] = document.getElementById(`engine-${engine}`).checked;
                });

                const numResults = parseInt(document.getElementById("num-results").value, 10) || 20;
                return { action: "search", value, filters, engines, numResults };
            };

            const submitSearch = () => {
                const payload = getSearchPayload();
                if (!payload) {
                    return;
                }
                state.pendingAction = payload;
                closeHistory();
            };

            const queueAction = (action) => {
                state.pendingAction = { action };
                closeHistory();
                setStatus("Processing...");
            };

            const setStatus = (message, isError = false) => {
                actionStatus.textContent = String(message || "");
                actionStatus.classList.toggle("is-error", Boolean(isError));
            };

            const setVpnStatus = (status, label, detail) => {
                vpnStatusButton.className = `vpn-status vpn-status--${status}`;
                vpnStatusLabel.textContent = label;
                vpnStatusButton.title = `${detail} Click to refresh.`;
                vpnStatusButton.setAttribute("aria-label", `${label}. ${detail}`);
                vpnStatusButton.disabled = status === "checking";
            };

            const checkVpnStatus = async () => {
                const checkId = ++state.vpnCheckId;
                const controller = new AbortController();
                const timeoutId = window.setTimeout(() => controller.abort(), 5000);
                setVpnStatus(
                    "checking",
                    "Checking VPN",
                    "Checking the public IP used by Chrome."
                );

                try {
                    const response = await fetch(vpnCheckUrl, {
                        cache: "no-store",
                        signal: controller.signal
                    });
                    if (!response.ok) {
                        throw new Error(`VPN check failed with HTTP ${response.status}`);
                    }

                    const payload = await response.json();
                    if (payload.error || typeof payload.is_vpn !== "boolean") {
                        throw new Error(payload.error || "VPN status is missing");
                    }
                    if (checkId !== state.vpnCheckId) {
                        return;
                    }

                    if (payload.is_vpn) {
                        setVpnStatus(
                            "active",
                            "VPN likely",
                            "The public IP is listed as a known VPN exit node. Detection can be wrong."
                        );
                    } else {
                        setVpnStatus(
                            "inactive",
                            "VPN not detected",
                            "The public IP is not listed as a known VPN exit node. This does not prove that a VPN is off."
                        );
                    }
                } catch (error) {
                    if (checkId !== state.vpnCheckId) {
                        return;
                    }
                    setVpnStatus(
                        "unknown",
                        "VPN unknown",
                        "The external VPN check is unavailable or timed out."
                    );
                } finally {
                    window.clearTimeout(timeoutId);
                }
            };

            const setHistory = (history) => {
                const seen = new Set();
                state.history = Array.isArray(history)
                    ? history.filter((item) => {
                        const query = String(item && item.query || "").trim();
                        const displayQuery = String(item && item.display_query || query || item.smart_query || "").trim();
                        const filters = item && typeof item.filters === "object" && item.filters ? item.filters : {};
                        const dedupeKey = JSON.stringify([query, filters]);
                        if (!displayQuery || seen.has(dedupeKey)) {
                            return false;
                        }
                        seen.add(dedupeKey);
                        item.query = query;
                        item.display_query = displayQuery;
                        item.filters = filters;
                        return true;
                    })
                    : [];
                renderHistory(searchField.value);
            };

            const getFilters = () => {
                const filters = {};
                Object.entries(filterInputIds).forEach(([name, id]) => {
                    filters[name] = document.getElementById(id).value.trim();
                });
                return filters;
            };

            const setFilters = (filters) => {
                Object.entries(filterInputIds).forEach(([name, id]) => {
                    document.getElementById(id).value = String(filters[name] || "");
                });
            };

            const consumeAction = () => {
                const action = state.pendingAction;
                state.pendingAction = null;
                return action;
            };

            searchButton.addEventListener("click", submitSearch);
            vpnStatusButton.addEventListener("click", checkVpnStatus);
            clearSynthesixHistoryButton.addEventListener("click", () => {
                if (confirm("Delete all Synthesix search history and generated result reports?")) {
                    queueAction("clear_synthesix_history");
                }
            });
            clearBrowserDataButton.addEventListener("click", () => {
                if (
                    confirm(
                        "Clear history, cookies, cache, and site data from the Synthesix "
                        + "browser profile? Saved sessions will be signed out."
                    )
                ) {
                    queueAction("clear_browser_data");
                }
            });
            searchField.addEventListener("input", openHistory);
            searchField.addEventListener("focus", openHistory);
            searchField.addEventListener("keydown", (event) => {
                if (event.key === "ArrowDown" && state.visibleItems.length) {
                    event.preventDefault();
                    openHistory();
                    setActiveItem((state.activeIndex + 1) % state.visibleItems.length);
                    return;
                }
                if (event.key === "ArrowUp" && state.visibleItems.length) {
                    event.preventDefault();
                    openHistory();
                    setActiveItem((state.activeIndex - 1 + state.visibleItems.length) % state.visibleItems.length);
                    return;
                }
                if (event.key === "Enter") {
                    if (state.activeIndex >= 0 && state.visibleItems[state.activeIndex]) {
                        event.preventDefault();
                        selectHistoryItem(state.visibleItems[state.activeIndex]);
                        return;
                    }
                    submitSearch();
                    return;
                }
                if (event.key === "Escape") {
                    closeHistory();
                }
            });
            document.addEventListener("mousedown", (event) => {
                if (!historyPanel.contains(event.target) && event.target !== searchField) {
                    closeHistory();
                }
            });

            window.synthesixHome = {
                setHistory,
                setStatus,
                checkVpnStatus,
                consumeAction
            };
            checkVpnStatus();
        })();
    </script>
</body>
</html>
