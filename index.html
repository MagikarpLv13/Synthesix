<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Synthesix is a multi-engine search tool that allows you to perform precise and advanced queries across several search engines (Google, Bing, Brave, DuckDuckGo).">
    <meta name="keywords" content="search, multi-engine, google, bing, brave, duckduckgo, synthesix">
    <title>Synthesix</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="theme.css">
    <script src="theme.js"></script>
</head>
<body>
    <main class="app">
        <header class="topbar">
            <div class="brand">
                <img class="brand-logo" src="assets/synthesix-mark.svg" alt="">
                <div class="brand-copy">
                    <h1 class="brand-name">Synthesix</h1>
                    <span class="brand-subtitle">Multi-engine search</span>
                </div>
            </div>
            <div class="top-actions">
                <button
                    id="vpn-status"
                    class="vpn-status vpn-status--checking"
                    type="button"
                    title="Checking the public IP used by Chrome. Click to refresh."
                    aria-label="Checking VPN status"
                >
                    <span class="vpn-status__dot" aria-hidden="true"></span>
                    <span id="vpn-status-label">Checking VPN</span>
                </button>
                <a href="history/history.html" target="_blank" rel="noopener noreferrer" class="nav-link">History</a>
                <button type="button" class="theme-toggle" data-theme-toggle aria-pressed="false">Dark mode</button>
            </div>
        </header>

        <section class="workspace" aria-label="Search workspace">
            <h2 class="search-title">Search, compare, synthesize.</h2>
            <div class="investigation-bar" aria-label="Active investigation">
                <div class="investigation-context">
                    <label for="investigation-select">Investigation</label>
                    <select id="investigation-select">
                        <option value="">No investigation</option>
                    </select>
                    <span id="investigation-summary" class="investigation-summary"></span>
                </div>
                <div class="investigation-actions">
                    <button id="open-investigation" class="primary-button" type="button" disabled>
                        Open
                    </button>
                    <button id="new-investigation" class="secondary-button" type="button">
                        New
                    </button>
                    <button id="edit-investigation" class="secondary-button" type="button" disabled>
                        Edit
                    </button>
                    <button id="archive-investigation" class="secondary-button" type="button" disabled>
                        Archive
                    </button>
                    <button id="delete-investigation" class="danger-button" type="button" disabled>
                        Delete
                    </button>
                </div>
            </div>
            <div class="search-form">
                <div class="search-row">
                    <label for="search-field" class="sr-only">Search query</label>
                    <input
                        type="text"
                        id="search-field"
                        class="search-input"
                        required
                        autocomplete="off"
                        aria-autocomplete="list"
                        aria-expanded="false"
                        aria-controls="history-panel"
                        placeholder="What are you investigating?"
                    >
                    <button id="search-button" class="search-button" type="button">Search</button>
                </div>
                <div id="history-panel" class="history-panel" role="listbox" aria-label="Previous searches"></div>
            </div>

            <details class="osint-panel">
                <summary>OSINT filters</summary>
                <div class="operator-grid" aria-label="OSINT search filters">
                    <label class="operator-field" for="filter-site">
                        <span>Site</span>
                        <input type="text" id="filter-site" placeholder="example.com">
                    </label>
                    <label class="operator-field" for="filter-exclude">
                        <span>Exclude</span>
                        <input type="text" id="filter-exclude" placeholder="cheese">
                    </label>
                    <label class="operator-field" for="filter-title">
                        <span>Title</span>
                        <input type="text" id="filter-title" placeholder="profile">
                    </label>
                    <label class="operator-field" for="filter-url">
                        <span>URL</span>
                        <input type="text" id="filter-url" placeholder="admin">
                    </label>
                    <label class="operator-field" for="filter-body">
                        <span>Page text</span>
                        <input type="text" id="filter-body" placeholder="email">
                    </label>
                    <label class="operator-field" for="filter-filetype">
                        <span>File</span>
                        <input type="text" id="filter-filetype" placeholder="pdf">
                    </label>
                    <label class="operator-field" for="filter-country">
                        <span>Country</span>
                        <input
                            type="text"
                            id="filter-country"
                            list="country-options"
                            placeholder="Sweden or SE"
                            autocomplete="off"
                        >
                    </label>
                    <label class="operator-field" for="filter-after">
                        <span>After</span>
                        <input type="date" id="filter-after">
                    </label>
                    <label class="operator-field" for="filter-before">
                        <span>Before</span>
                        <input type="date" id="filter-before">
                    </label>
                </div>
                <datalist id="country-options">
                    <option value="Argentina">AR</option>
                    <option value="Australia">AU</option>
                    <option value="Austria">AT</option>
                    <option value="Belgium">BE</option>
                    <option value="Brazil">BR</option>
                    <option value="Bulgaria">BG</option>
                    <option value="Canada">CA</option>
                    <option value="Chile">CL</option>
                    <option value="China">CN</option>
                    <option value="Colombia">CO</option>
                    <option value="Croatia">HR</option>
                    <option value="Czechia">CZ</option>
                    <option value="Denmark">DK</option>
                    <option value="Estonia">EE</option>
                    <option value="Finland">FI</option>
                    <option value="France">FR</option>
                    <option value="Germany">DE</option>
                    <option value="Greece">GR</option>
                    <option value="Hong Kong">HK</option>
                    <option value="Hungary">HU</option>
                    <option value="Iceland">IS</option>
                    <option value="India">IN</option>
                    <option value="Indonesia">ID</option>
                    <option value="Ireland">IE</option>
                    <option value="Israel">IL</option>
                    <option value="Italy">IT</option>
                    <option value="Japan">JP</option>
                    <option value="South Korea">KR</option>
                    <option value="Latvia">LV</option>
                    <option value="Lithuania">LT</option>
                    <option value="Malaysia">MY</option>
                    <option value="Mexico">MX</option>
                    <option value="Netherlands">NL</option>
                    <option value="New Zealand">NZ</option>
                    <option value="Norway">NO</option>
                    <option value="Pakistan">PK</option>
                    <option value="Peru">PE</option>
                    <option value="Philippines">PH</option>
                    <option value="Poland">PL</option>
                    <option value="Portugal">PT</option>
                    <option value="Romania">RO</option>
                    <option value="Russia">RU</option>
                    <option value="Saudi Arabia">SA</option>
                    <option value="Singapore">SG</option>
                    <option value="Slovakia">SK</option>
                    <option value="Slovenia">SI</option>
                    <option value="South Africa">ZA</option>
                    <option value="Spain">ES</option>
                    <option value="Sweden">SE</option>
                    <option value="Switzerland">CH</option>
                    <option value="Taiwan">TW</option>
                    <option value="Thailand">TH</option>
                    <option value="Turkey">TR</option>
                    <option value="Ukraine">UA</option>
                    <option value="United Kingdom">GB</option>
                    <option value="United States">US</option>
                    <option value="Vietnam">VN</option>
                </datalist>
            </details>

            <div class="controls">
                <div class="engine-group" aria-label="Search engines">
                    <label class="engine-option"><input type="checkbox" id="engine-google" checked> Google</label>
                    <label class="engine-option"><input type="checkbox" id="engine-bing" checked> Bing</label>
                    <label class="engine-option"><input type="checkbox" id="engine-brave" checked> Brave</label>
                    <label class="engine-option"><input type="checkbox" id="engine-duckduckgo" checked> DuckDuckGo</label>
                </div>
                <label for="num-results" class="result-control">
                    Results
                    <input type="number" id="num-results" min="1" max="100" value="20">
                </label>
            </div>
            <div class="data-actions" aria-label="Data management">
                <span class="data-actions__label">Data</span>
                <button id="clear-synthesix-history" class="secondary-button" type="button">
                    Clear Synthesix history
                </button>
                <button id="clear-browser-data" class="danger-button" type="button">
                    Clear browser data
                </button>
            </div>
            <p id="action-status" class="action-status" role="status" aria-live="polite"></p>
            <p class="session-note">Closing all Synthesix tabs stops the program.</p>
        </section>
    </main>

    <dialog id="investigation-dialog" class="investigation-dialog">
        <form id="investigation-form" class="investigation-form">
            <div class="dialog-header">
                <h2 id="investigation-dialog-title">New investigation</h2>
                <button
                    id="close-investigation-dialog"
                    class="icon-button"
                    type="button"
                    aria-label="Close"
                    title="Close"
                >&times;</button>
            </div>
            <div class="dialog-fields">
                <label for="investigation-title">
                    <span>Title</span>
                    <input id="investigation-title" type="text" maxlength="120" required>
                </label>
                <label for="investigation-reference">
                    <span>Reference</span>
                    <input id="investigation-reference" type="text" maxlength="120">
                </label>
                <label for="investigation-description">
                    <span>Description</span>
                    <textarea id="investigation-description" maxlength="4000" rows="5"></textarea>
                </label>
                <label for="investigation-tags">
                    <span>Tags</span>
                    <input
                        id="investigation-tags"
                        type="text"
                        placeholder="priority, person, company"
                    >
                </label>
            </div>
            <div class="dialog-actions">
                <button id="cancel-investigation-dialog" class="secondary-button" type="button">
                    Cancel
                </button>
                <button class="primary-button" type="submit">Save</button>
            </div>
        </form>
    </dialog>

    <script>
        (() => {
            window.name = "synthesix-home";

            const searchButton = document.getElementById("search-button");
            const searchField = document.getElementById("search-field");
            const historyPanel = document.getElementById("history-panel");
            const actionStatus = document.getElementById("action-status");
            const investigationSelect = document.getElementById("investigation-select");
            const investigationSummary = document.getElementById("investigation-summary");
            const openInvestigationButton = document.getElementById("open-investigation");
            const newInvestigationButton = document.getElementById("new-investigation");
            const editInvestigationButton = document.getElementById("edit-investigation");
            const archiveInvestigationButton = document.getElementById("archive-investigation");
            const deleteInvestigationButton = document.getElementById("delete-investigation");
            const investigationDialog = document.getElementById("investigation-dialog");
            const investigationForm = document.getElementById("investigation-form");
            const investigationDialogTitle = document.getElementById("investigation-dialog-title");
            const investigationTitle = document.getElementById("investigation-title");
            const investigationReference = document.getElementById("investigation-reference");
            const investigationDescription = document.getElementById("investigation-description");
            const investigationTags = document.getElementById("investigation-tags");
            const closeInvestigationDialogButton = document.getElementById("close-investigation-dialog");
            const cancelInvestigationDialogButton = document.getElementById("cancel-investigation-dialog");
            const clearSynthesixHistoryButton = document.getElementById("clear-synthesix-history");
            const clearBrowserDataButton = document.getElementById("clear-browser-data");
            const vpnStatusButton = document.getElementById("vpn-status");
            const vpnStatusLabel = document.getElementById("vpn-status-label");
            const vpnCheckUrl = "https://api.ipapi.is";
            const activeInvestigationStorageKey = "synthesix-active-investigation";
            const engineIds = ["google", "bing", "brave", "duckduckgo"];
            const filterInputIds = {
                site: "filter-site",
                exclude: "filter-exclude",
                title: "filter-title",
                url: "filter-url",
                body: "filter-body",
                filetype: "filter-filetype",
                country: "filter-country",
                after: "filter-after",
                before: "filter-before"
            };
            const state = {
                history: [],
                visibleItems: [],
                activeIndex: -1,
                pendingAction: null,
                vpnCheckId: 0,
                investigations: [],
                requestedInvestigationId: "",
                announcedInvestigationId: null
            };

            const normalize = (value) => String(value || "").toLowerCase().trim();

            try {
                state.requestedInvestigationId = String(
                    window.localStorage.getItem(activeInvestigationStorageKey) || ""
                );
            } catch (_error) {
                state.requestedInvestigationId = "";
            }

            const selectedInvestigation = () => {
                const selectedId = investigationSelect.value;
                return state.investigations.find((item) => item.id === selectedId) || null;
            };

            const formatCount = (value, singular, plural) => {
                const count = Number(value || 0);
                return `${count} ${count === 1 ? singular : plural}`;
            };

            const announceInvestigationSelection = () => {
                const investigation = selectedInvestigation();
                const selectedId = investigation?.status === "active"
                    ? investigation.id
                    : "";
                if (state.announcedInvestigationId === selectedId) {
                    return;
                }
                if (
                    state.pendingAction
                    && state.pendingAction.action !== "select_investigation"
                ) {
                    return;
                }
                state.announcedInvestigationId = selectedId;
                state.pendingAction = {
                    action: "select_investigation",
                    investigationId: selectedId
                };
            };

            const updateInvestigationControls = () => {
                const investigation = selectedInvestigation();
                const hasInvestigation = Boolean(investigation);
                const isActive = investigation?.status === "active";
                openInvestigationButton.disabled = !hasInvestigation;
                editInvestigationButton.disabled = !isActive;
                archiveInvestigationButton.disabled = !isActive;
                deleteInvestigationButton.disabled = !hasInvestigation;

                if (!investigation) {
                    investigationSummary.textContent = "";
                    return;
                }

                const parts = [];
                if (investigation.reference) {
                    parts.push(investigation.reference);
                }
                if (!isActive) {
                    parts.push("Archived");
                }
                parts.push(formatCount(investigation.search_count, "search", "searches"));
                parts.push(
                    formatCount(
                        investigation.result_count,
                        "saved page",
                        "saved pages"
                    )
                );
                investigationSummary.textContent = parts.join(" · ");
            };

            const setSelectedInvestigation = (investigationId) => {
                const requestedId = String(investigationId || "");
                state.requestedInvestigationId = requestedId;
                const exists = state.investigations.some((item) => item.id === requestedId);
                investigationSelect.value = exists ? requestedId : "";
                try {
                    if (requestedId) {
                        window.localStorage.setItem(
                            activeInvestigationStorageKey,
                            requestedId
                        );
                    } else {
                        window.localStorage.removeItem(activeInvestigationStorageKey);
                    }
                } catch (_error) {
                    // The selection still works for the current session.
                }
                updateInvestigationControls();
                announceInvestigationSelection();
            };

            const setInvestigations = (investigations) => {
                state.investigations = Array.isArray(investigations)
                    ? investigations.filter(
                        (item) => (
                            item
                            && item.id
                            && ["active", "archived"].includes(item.status)
                        )
                    )
                    : [];

                investigationSelect.innerHTML = "";
                const emptyOption = document.createElement("option");
                emptyOption.value = "";
                emptyOption.textContent = "No investigation";
                investigationSelect.appendChild(emptyOption);

                state.investigations.forEach((investigation) => {
                    const option = document.createElement("option");
                    option.value = investigation.id;
                    const label = investigation.reference
                        ? `${investigation.title} · ${investigation.reference}`
                        : investigation.title;
                    option.textContent = investigation.status === "archived"
                        ? `${label} (archived)`
                        : label;
                    investigationSelect.appendChild(option);
                });

                const requestedId = state.requestedInvestigationId;
                const exists = state.investigations.some((item) => item.id === requestedId);
                if (!exists) {
                    state.requestedInvestigationId = "";
                    try {
                        window.localStorage.removeItem(activeInvestigationStorageKey);
                    } catch (_error) {
                        // Ignore storage failures.
                    }
                }
                investigationSelect.value = exists ? requestedId : "";
                updateInvestigationControls();
                announceInvestigationSelection();
            };

            const openInvestigationDialog = (mode) => {
                const investigation = mode === "edit" ? selectedInvestigation() : null;
                if (mode === "edit" && !investigation) {
                    return;
                }

                investigationForm.dataset.mode = mode;
                investigationDialogTitle.textContent = mode === "edit"
                    ? "Edit investigation"
                    : "New investigation";
                investigationTitle.value = investigation ? investigation.title : "";
                investigationReference.value = investigation ? investigation.reference : "";
                investigationDescription.value = investigation ? investigation.description : "";
                investigationTags.value = investigation ? (investigation.tags || []).join(", ") : "";
                investigationDialog.showModal();
                investigationTitle.focus();
            };

            const closeInvestigationDialog = () => {
                investigationDialog.close();
                investigationForm.reset();
            };

            const setCaretToEnd = () => {
                const end = searchField.value.length;
                searchField.setSelectionRange(end, end);
            };

            const closeHistory = () => {
                state.activeIndex = -1;
                historyPanel.classList.remove("is-open");
                searchField.setAttribute("aria-expanded", "false");
            };

            const openHistory = () => {
                renderHistory(searchField.value);
                if (state.visibleItems.length || state.history.length) {
                    historyPanel.classList.add("is-open");
                    searchField.setAttribute("aria-expanded", "true");
                }
            };

            const selectHistoryItem = (item) => {
                searchField.value = item.query || "";
                setFilters(item.filters || {});
                if (item.investigation_id) {
                    setSelectedInvestigation(item.investigation_id);
                }
                closeHistory();
                searchField.focus();
                setCaretToEnd();
            };

            const setActiveItem = (index) => {
                state.activeIndex = index;
                Array.from(historyPanel.querySelectorAll(".history-item")).forEach((item, itemIndex) => {
                    item.classList.toggle("is-active", itemIndex === index);
                });
            };

            const renderHistory = (filterValue = "") => {
                const filter = normalize(filterValue);
                state.visibleItems = state.history
                    .filter((item) => {
                        const haystack = [
                            item.query,
                            item.display_query,
                            item.smart_query,
                            JSON.stringify(item.filters || {})
                        ].map(normalize).join(" ");
                        return !filter || haystack.includes(filter);
                    })
                    .slice(0, 8);
                state.activeIndex = -1;
                historyPanel.innerHTML = "";

                if (!state.visibleItems.length) {
                    if (!state.history.length) {
                        historyPanel.innerHTML = '<div class="empty-history">No previous searches yet.</div>';
                    } else {
                        historyPanel.innerHTML = '<div class="empty-history">No matching searches.</div>';
                    }
                    return;
                }

                state.visibleItems.forEach((item, index) => {
                    const button = document.createElement("button");
                    button.type = "button";
                    button.className = "history-item";
                    button.setAttribute("role", "option");
                    button.dataset.index = String(index);

                    const content = document.createElement("span");
                    const query = document.createElement("span");
                    query.className = "history-query";
                    query.textContent = item.display_query || item.query;

                    const meta = document.createElement("span");
                    meta.className = "history-meta";
                    meta.textContent = item.smart_query && item.smart_query !== item.query
                        ? item.smart_query
                        : item.date || "Previous search";

                    const count = document.createElement("span");
                    count.className = "history-count";
                    count.textContent = item.nb_results === "" ? "" : `${item.nb_results} results`;

                    content.append(query, meta);
                    button.append(content, count);
                    button.addEventListener("mousedown", (event) => {
                        event.preventDefault();
                        selectHistoryItem(item);
                    });
                    historyPanel.appendChild(button);
                });
            };

            const getSearchPayload = () => {
                const value = searchField.value.trim();
                const filters = getFilters();
                const hasFilters = Object.values(filters).some(Boolean);
                if (!value && !hasFilters) {
                    alert("Please enter a search term or filter.");
                    searchField.focus();
                    return null;
                }
                if (filters.after && filters.before && filters.after > filters.before) {
                    alert("The After date must be earlier than or equal to the Before date.");
                    document.getElementById("filter-after").focus();
                    return null;
                }
                const investigation = selectedInvestigation();
                if (investigation && investigation.status !== "active") {
                    setStatus(
                        "Archived investigations are read-only. Select an active investigation.",
                        true
                    );
                    return null;
                }

                const engines = {};
                engineIds.forEach((engine) => {
                    engines[engine] = document.getElementById(`engine-${engine}`).checked;
                });

                const numResults = parseInt(document.getElementById("num-results").value, 10) || 20;
                return {
                    action: "search",
                    value,
                    filters,
                    engines,
                    numResults,
                    investigationId: investigationSelect.value || ""
                };
            };

            const submitSearch = () => {
                const payload = getSearchPayload();
                if (!payload) {
                    return;
                }
                state.pendingAction = payload;
                closeHistory();
            };

            const queueAction = (action, payload = {}) => {
                state.pendingAction = { action, ...payload };
                closeHistory();
                setStatus("Processing...");
            };

            const setStatus = (message, isError = false) => {
                actionStatus.textContent = String(message || "");
                actionStatus.classList.toggle("is-error", Boolean(isError));
            };

            const setVpnStatus = (status, label, detail) => {
                vpnStatusButton.className = `vpn-status vpn-status--${status}`;
                vpnStatusLabel.textContent = label;
                vpnStatusButton.title = `${detail} Click to refresh.`;
                vpnStatusButton.setAttribute("aria-label", `${label}. ${detail}`);
                vpnStatusButton.disabled = status === "checking";
            };

            const checkVpnStatus = async () => {
                const checkId = ++state.vpnCheckId;
                const controller = new AbortController();
                const timeoutId = window.setTimeout(() => controller.abort(), 5000);
                setVpnStatus(
                    "checking",
                    "Checking VPN",
                    "Checking the public IP used by Chrome."
                );

                try {
                    const response = await fetch(vpnCheckUrl, {
                        cache: "no-store",
                        signal: controller.signal
                    });
                    if (!response.ok) {
                        throw new Error(`VPN check failed with HTTP ${response.status}`);
                    }

                    const payload = await response.json();
                    if (payload.error || typeof payload.is_vpn !== "boolean") {
                        throw new Error(payload.error || "VPN status is missing");
                    }
                    if (checkId !== state.vpnCheckId) {
                        return;
                    }

                    if (payload.is_vpn) {
                        setVpnStatus(
                            "active",
                            "VPN likely",
                            "The public IP is listed as a known VPN exit node. Detection can be wrong."
                        );
                    } else {
                        setVpnStatus(
                            "inactive",
                            "VPN not detected",
                            "The public IP is not listed as a known VPN exit node. This does not prove that a VPN is off."
                        );
                    }
                } catch (error) {
                    if (checkId !== state.vpnCheckId) {
                        return;
                    }
                    setVpnStatus(
                        "unknown",
                        "VPN unknown",
                        "The external VPN check is unavailable or timed out."
                    );
                } finally {
                    window.clearTimeout(timeoutId);
                }
            };

            const setHistory = (history) => {
                const seen = new Set();
                state.history = Array.isArray(history)
                    ? history.filter((item) => {
                        const query = String(item && item.query || "").trim();
                        const displayQuery = String(item && item.display_query || query || item.smart_query || "").trim();
                        const filters = item && typeof item.filters === "object" && item.filters ? item.filters : {};
                        const dedupeKey = JSON.stringify([query, filters]);
                        if (!displayQuery || seen.has(dedupeKey)) {
                            return false;
                        }
                        seen.add(dedupeKey);
                        item.query = query;
                        item.display_query = displayQuery;
                        item.filters = filters;
                        return true;
                    })
                    : [];
                renderHistory(searchField.value);
            };

            const getFilters = () => {
                const filters = {};
                Object.entries(filterInputIds).forEach(([name, id]) => {
                    filters[name] = document.getElementById(id).value.trim();
                });
                return filters;
            };

            const setFilters = (filters) => {
                Object.entries(filterInputIds).forEach(([name, id]) => {
                    document.getElementById(id).value = String(filters[name] || "");
                });
            };

            const consumeAction = () => {
                const action = state.pendingAction;
                state.pendingAction = null;
                return action;
            };

            searchButton.addEventListener("click", submitSearch);
            vpnStatusButton.addEventListener("click", checkVpnStatus);
            investigationSelect.addEventListener("change", () => {
                setSelectedInvestigation(investigationSelect.value);
            });
            newInvestigationButton.addEventListener("click", () => {
                openInvestigationDialog("create");
            });
            openInvestigationButton.addEventListener("click", () => {
                const investigation = selectedInvestigation();
                if (investigation) {
                    queueAction("open_investigation", {
                        investigationId: investigation.id
                    });
                }
            });
            editInvestigationButton.addEventListener("click", () => {
                openInvestigationDialog("edit");
            });
            archiveInvestigationButton.addEventListener("click", () => {
                const investigation = selectedInvestigation();
                if (
                    investigation &&
                    confirm(`Archive the investigation "${investigation.title}"?`)
                ) {
                    queueAction("archive_investigation", {
                        investigationId: investigation.id
                    });
                }
            });
            deleteInvestigationButton.addEventListener("click", () => {
                const investigation = selectedInvestigation();
                if (
                    investigation &&
                    confirm(
                        `Delete the empty investigation "${investigation.title}"? `
                        + "Investigations containing searches must be archived."
                    )
                ) {
                    queueAction("delete_investigation", {
                        investigationId: investigation.id
                    });
                }
            });
            investigationForm.addEventListener("submit", (event) => {
                event.preventDefault();
                const mode = investigationForm.dataset.mode || "create";
                const investigation = selectedInvestigation();
                const payload = {
                    investigation: {
                        title: investigationTitle.value.trim(),
                        reference: investigationReference.value.trim(),
                        description: investigationDescription.value.trim(),
                        tags: investigationTags.value.trim()
                    }
                };
                if (!payload.investigation.title) {
                    investigationTitle.focus();
                    return;
                }
                if (mode === "edit" && investigation) {
                    payload.investigationId = investigation.id;
                    queueAction("update_investigation", payload);
                } else {
                    queueAction("create_investigation", payload);
                }
                closeInvestigationDialog();
            });
            closeInvestigationDialogButton.addEventListener(
                "click",
                closeInvestigationDialog
            );
            cancelInvestigationDialogButton.addEventListener(
                "click",
                closeInvestigationDialog
            );
            clearSynthesixHistoryButton.addEventListener("click", () => {
                if (
                    confirm(
                        "Delete all Synthesix search history and generated result reports? "
                        + "Investigation folders and explicitly saved pages are preserved."
                    )
                ) {
                    queueAction("clear_synthesix_history");
                }
            });
            clearBrowserDataButton.addEventListener("click", () => {
                if (
                    confirm(
                        "Clear history, cookies, cache, and site data from the Synthesix "
                        + "browser profile? Saved sessions will be signed out."
                    )
                ) {
                    queueAction("clear_browser_data");
                }
            });
            searchField.addEventListener("input", openHistory);
            searchField.addEventListener("focus", openHistory);
            searchField.addEventListener("keydown", (event) => {
                if (event.key === "ArrowDown" && state.visibleItems.length) {
                    event.preventDefault();
                    openHistory();
                    setActiveItem((state.activeIndex + 1) % state.visibleItems.length);
                    return;
                }
                if (event.key === "ArrowUp" && state.visibleItems.length) {
                    event.preventDefault();
                    openHistory();
                    setActiveItem((state.activeIndex - 1 + state.visibleItems.length) % state.visibleItems.length);
                    return;
                }
                if (event.key === "Enter") {
                    if (state.activeIndex >= 0 && state.visibleItems[state.activeIndex]) {
                        event.preventDefault();
                        selectHistoryItem(state.visibleItems[state.activeIndex]);
                        return;
                    }
                    submitSearch();
                    return;
                }
                if (event.key === "Escape") {
                    closeHistory();
                }
            });
            document.addEventListener("mousedown", (event) => {
                if (!historyPanel.contains(event.target) && event.target !== searchField) {
                    closeHistory();
                }
            });

            window.synthesixHome = {
                setHistory,
                setInvestigations,
                setSelectedInvestigation,
                setStatus,
                checkVpnStatus,
                consumeAction
            };
            checkVpnStatus();
        })();
    </script>
</body>
</html>
